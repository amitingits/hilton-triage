name: macOS Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      # This step bypasses the need for an Apple Team ID/Certificate
      - name: Disable Code Signing
        run: |
          echo "CODE_SIGNING_ALLOWED=NO" >> macos/Runner/Configs/AppInfo.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> macos/Runner/Configs/AppInfo.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> macos/Runner/Configs/AppInfo.xcconfig

      - name: Build macOS Release
        run: flutter build macos --release

      - name: Package App (Zip)
        run: |
          cd build/macos/Build/Products/Release
          zip -r app.zip triage_ng.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: build/macos/Build/Products/Release/app.zip
